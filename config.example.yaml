# Example Hermes Agent Configuration for Multiple Ollama Servers
# Copy this to ~/.hermes/config.yaml and customize for your setup

providers:
  # ═══════════════════════════════════════════════════════════
  # PRIMARY PROVIDER - Cloud Ollama (Default)
  # ═══════════════════════════════════════════════════════════
  ollama-cloud:
    base_url: https://ollama.com/v1
    timeout: 120
    retry_count: 3
    models:
      - name: qwen3.5:397b
        context_window: 256000
        is_default: true
        description: "Primary large model for complex tasks"

  # ═══════════════════════════════════════════════════════════
  # LOCAL PROVIDER - Home Network Ollama Server
  # ═══════════════════════════════════════════════════════════
  ollama-local:
    base_url: http://10.0.0.86:11434/v1
    timeout: 60
    retry_count: 2
    keep_alive: 10m
    models:
      - name: qwen2.5:7b
        context_window: 64000
        description: "Fast local model for quick tasks"
      - name: gemma4:31b-cloud
        context_window: 128000
        description: "Google's Gemma for balanced performance"
      - name: qwen3.5:397b-cloud
        context_window: 256000
        description: "Large model on local network"

  # ═══════════════════════════════════════════════════════════
  # SECONDARY PROVIDER - Backup Ollama Server
  # ═══════════════════════════════════════════════════════════
  ollama-secondary:
    base_url: http://10.0.0.140:11434/v1
    timeout: 60
    retry_count: 2
    models:
      - name: qwen3:32b
        context_window: 128000
        description: "Qwen3 32B for general tasks"
      - name: qwen3.5:35b
        context_window: 256000
        description: "Latest Qwen 35B model"
      - name: qwen2.5-coder:32b
        context_window: 128000
        description: "Specialized for coding tasks"
      - name: deepseek-r1:32b
        context_window: 128000
        description: "DeepSeek reasoning model"
      - name: qwen2.5vl:32b
        context_window: 64000
        description: "Vision-language model"

# ═══════════════════════════════════════════════════════════
# TELEGRAM CONFIGURATION
# ═══════════════════════════════════════════════════════════
telegram:
  enabled: true
  model_switching: true  # Enable /model command
  show_context_window: true  # Display context limits in /model output

# ═══════════════════════════════════════════════════════════
# DEFAULT BEHAVIOR
# ═══════════════════════════════════════════════════════════
defaults:
  provider: ollama-cloud
  model: qwen3.5:397b
  temperature: 0.7
  max_tokens: 4096

# ═══════════════════════════════════════════════════════════
# OPTIONAL: FAILover CONFIGURATION
# ═══════════════════════════════════════════════════════════
# failover:
#   enabled: true
#   automatic: false  # Set true for auto-failover on errors
#   order:
#     - ollama-cloud
#     - ollama-local
#     - ollama-secondary

